<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#gradient)"/>
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#2c5282"/>
    </linearGradient>
  </defs>
  
  <!-- Tech pattern background -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="50" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="1100" cy="530" r="50" stroke="white" stroke-width="2" fill="none"/>
    <rect x="200" y="450" width="80" height="80" stroke="white" stroke-width="2" fill="none" transform="rotate(45 240 490)"/>
    <rect x="950" y="80" width="80" height="80" stroke="white" stroke-width="2" fill="none" transform="rotate(45 990 120)"/>
  </g>
  
  <!-- Main icon -->
  <g transform="translate(450, 215)">
    <!-- Newspaper/Article icon -->
    <rect x="0" y="0" width="300" height="200" rx="8" fill="white" opacity="0.15"/>
    <rect x="20" y="20" width="260" height="40" rx="4" fill="white" opacity="0.3"/>
    <rect x="20" y="75" width="180" height="12" rx="2" fill="white" opacity="0.25"/>
    <rect x="20" y="95" width="200" height="12" rx="2" fill="white" opacity="0.25"/>
    <rect x="20" y="115" width="160" height="12" rx="2" fill="white" opacity="0.25"/>
    <rect x="20" y="145" width="120" height="35" rx="4" fill="white" opacity="0.2"/>
    <rect x="155" y="145" width="125" height="35" rx="4" fill="white" opacity="0.2"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="white" text-anchor="middle" opacity="0.9">
    TechNews Article
  </text>
</svg>
